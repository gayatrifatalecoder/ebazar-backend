version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/ebazar
      - REDIS_HOST=redis
    depends_on:
      - mongo
      - redis
    volumes:
      - ./src:/app/src   # hot reload in dev
      - ./logs:/app/logs
    command: npm run dev

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: mongod --quiet

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Bull dashboard for monitoring queues (dev only)
  bull-board:
    image: deadly0/bull-board
    ports:
      - "3030:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

volumes:
  mongo_data:
  redis_data:
